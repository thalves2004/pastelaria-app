<!DOCTYPE html>

<html lang="pt-br">

<head>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#ff6600">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">


<title>Fechamento</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">



<script>

function calcular(id, produzido){


    let sobra = Number(document.getElementById("final_"+id).value) || 0;


    let perda = Number(document.getElementById("perda_"+id).value) || 0;



    let consumo = produzido - sobra - perda;



    if(consumo < 0){

        consumo = 0;

    }



    document.getElementById("consumo_"+id).innerHTML = consumo;


}






function totalizar(){


let valores = [

"maquina1",

"maquina2",

"maquina3",

"maquina4",

"dinheiro",

"pix"

];



let total = 0;



valores.forEach(function(id){


    total += Number(document.getElementById(id).value) || 0;


});



document.getElementById("total").innerHTML = total.toFixed(2);



}



</script>



</head>




<body class="bg-light">



<div class="container mt-4 mb-5">



<h3>

🌙 Fechamento do Dia

</h3>



<div class="alert alert-info">

📅 Data:

<b>

{{data}}

</b>

</div>









<form method="POST">







<h5>

🥟 Controle da produção

</h5>








{% for produto in produtos %}



<div class="card shadow-sm p-3 mb-3">



<h5>

{{produto[1]}}

</h5>



<span class="badge bg-secondary">

{{produto[2]}}

</span>





<hr>





<div class="text-center mb-3">


Produzido hoje


<br>


<h4 class="text-primary">

{{produto[3]}}

</h4>


</div>







<label>

Quantidade que sobrou:

</label>



<input

type="number"

class="form-control"

name="final_{{produto[0]}}"

id="final_{{produto[0]}}"

value="0"

oninput="calcular({{produto[0]}},{{produto[3]}})"

>







<label class="mt-3">

Perda:

</label>



<input

type="number"

class="form-control"

name="perda_{{produto[0]}}"

id="perda_{{produto[0]}}"

value="0"

oninput="calcular({{produto[0]}},{{produto[3]}})"

>








<div class="alert alert-success mt-3">


Consumido:

<b>

<span id="consumo_{{produto[0]}}">

0

</span>

</b>


</div>





</div>



{% endfor %}









<hr>




<h5>

💳 Cartões

</h5>



<div class="card shadow p-3">





<label>

Máquina 1

</label>

<input

class="form-control mb-2"

type="number"

step="0.01"

name="maquina1"

id="maquina1"

value="0"

oninput="totalizar()"

>






<label>

Máquina 2

</label>


<input

class="form-control mb-2"

type="number"

step="0.01"

name="maquina2"

id="maquina2"

value="0"

oninput="totalizar()"

>






<label>

Máquina 3

</label>


<input

class="form-control mb-2"

type="number"

step="0.01"

name="maquina3"

id="maquina3"

value="0"

oninput="totalizar()"

>






<label>

Máquina 4

</label>


<input

class="form-control mb-2"

type="number"

step="0.01"

name="maquina4"

id="maquina4"

value="0"

oninput="totalizar()"

>




</div>









<hr>



<h5>

💰 Pagamentos

</h5>




<div class="card shadow p-3">


<label>

Dinheiro

</label>


<input

class="form-control mb-2"

type="number"

step="0.01"

name="dinheiro"

id="dinheiro"

value="0"

oninput="totalizar()"

>





<label>

PIX

</label>


<input

class="form-control"

type="number"

step="0.01"

name="pix"

id="pix"

value="0"

oninput="totalizar()"

>




</div>







<div class="alert alert-success text-center mt-4">


<h5>

Total recebido

</h5>


<h3>

R$ <span id="total">0.00</span>

</h3>



</div>








<button class="btn btn-danger w-100">


🔒 Fechar Caixa


</button>




</form>







<a href="/dashboard"

class="btn btn-secondary w-100 mt-3">


Voltar


</a>




</div>


</body>

</html>
