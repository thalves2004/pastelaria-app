<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Produtos - PastelControl</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/static/style.css">

</head>


<body class="bg-light">


<div class="container mt-4 mb-5">


<div class="d-flex justify-content-between align-items-center">

<h3>
⚙️ Produtos
</h3>


<a href="/dashboard" class="btn btn-secondary">
⬅ Voltar
</a>


</div>


<hr>



<!-- CADASTRAR PRODUTO -->


<div class="card shadow p-4 mb-4">


<h5>
Adicionar produto
</h5>


<form method="POST">


<div class="mb-3">

<label>Nome</label>

<input
class="form-control"
name="nome"
required>

</div>



<div class="mb-3">

<label>Categoria</label>


<select
class="form-control"
name="categoria"
required>


<option value="Pastel">
Pastel
</option>


<option value="Bebida">
Bebida
</option>


<option value="Outro">
Outro
</option>


</select>


</div>



<button class="btn btn-success w-100">

Salvar

</button>


</form>


</div>






<!-- LISTA -->


<div class="card shadow p-4">


<h5>
Lista de produtos
</h5>


<hr>


<table class="table table-striped">


<thead>

<tr>

<th>
Nome
</th>


<th>
Categoria
</th>


<th>
Ação
</th>


</tr>


</thead>



<tbody>


{% for produto in produtos %}


<tr>


<td>

{{produto[1]}}

</td>



<td>

{{produto[2]}}

</td>




<td>


<a
href="/excluir_produto/{{produto[0]}}"
class="btn btn-danger btn-sm"
onclick="return confirm('Excluir produto?')">

🗑 Excluir

</a>



</td>


</tr>


{% endfor %}


</tbody>


</table>


</div>




<a href="/logout"
class="btn btn-secondary w-100 mt-4">

🚪 Sair

</a>



</div>


</body>

</html>
